<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONVOY — Defend the Cargo</title>
<style>
  /* ============================================================
     RESET & PAGE
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0604;
    color: #E8D8B0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* ============================================================
     STAGE (preserves 16:9 with letterbox)
     ============================================================ */
  #stage {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at center, #1a0d06 0%, #050302 100%);
  }

  #frame {
    position: relative;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    box-shadow:
      0 0 80px rgba(0,0,0,0.9),
      inset 0 0 120px rgba(0,0,0,0.4);
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: -webkit-optimize-contrast;
  }

  /* ============================================================
     HUD — panels in corners over canvas
     ============================================================ */
  .hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .hud.visible { opacity: 1; }

  .panel {
    position: relative;
    background: rgba(20, 12, 8, 0.85);
    border: 1px solid #6B4225;
    border-radius: 4px;
    padding: 10px 14px;
    box-shadow:
      inset 0 1px 0 rgba(139, 90, 43, 0.4),
      inset 0 -1px 0 rgba(0, 0, 0, 0.6),
      0 2px 8px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(2px);
  }

  /* Decorative rivets on corners */
  .panel::before, .panel::after {
    content: "";
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #8B5A2B, #2A1810);
    box-shadow: 0 0 2px rgba(0,0,0,0.8);
  }
  .panel::before { top: 4px; left: 4px; }
  .panel::after  { top: 4px; right: 4px; }

  .hud-tl {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 240px;
  }
  .hud-tr {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 240px;
  }

  /* HUD test button (Phase 1 debug control) */
  .hud-btn {
    position: absolute;
    pointer-events: auto;
    background: linear-gradient(180deg, #2A1810 0%, #1a0d06 100%);
    border: 1px solid #6B4225;
    color: #F2A623;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 10px 28px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 3px;
    box-shadow:
      inset 0 1px 0 rgba(139, 90, 43, 0.4),
      inset 0 -1px 0 rgba(0, 0, 0, 0.6),
      0 2px 8px rgba(0, 0, 0, 0.5);
    text-shadow: 0 0 4px rgba(242, 166, 35, 0.5);
    transition: all 0.15s ease;
  }
  .hud-btn:hover {
    border-color: #F2A623;
    color: #FFD580;
    box-shadow:
      inset 0 1px 0 rgba(139, 90, 43, 0.4),
      inset 0 -1px 0 rgba(0, 0, 0, 0.6),
      0 2px 12px rgba(242, 166, 35, 0.3);
  }
  .hud-btn:active {
    transform: translateY(1px);
  }
  .hud-btn.is-stopped {
    color: #6FBF45;
    border-color: #3a6624;
    text-shadow: 0 0 4px rgba(111, 191, 69, 0.5);
  }
  .hud-btn.is-stopped:hover {
    color: #A8E27A;
    border-color: #6FBF45;
    box-shadow:
      inset 0 1px 0 rgba(139, 90, 43, 0.4),
      inset 0 -1px 0 rgba(0, 0, 0, 0.6),
      0 2px 12px rgba(111, 191, 69, 0.3);
  }
  .hud-bc {
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
  }
  .hud-btn.hud-bc:active {
    transform: translateX(-50%) translateY(1px);
  }

  /* Seed debug panel (bottom-left) */
  .hud-bl {
    position: absolute;
    bottom: 16px;
    left: 16px;
    pointer-events: auto;
    width: 240px;
  }
  .seed-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .seed-input {
    flex: 1;
    background: rgba(10, 6, 3, 0.8);
    border: 1px solid #3D2615;
    color: #F2A623;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 8px;
    border-radius: 2px;
    outline: none;
    text-transform: uppercase;
    text-shadow: 0 0 4px rgba(242, 166, 35, 0.4);
    min-width: 0;
  }
  .seed-input:focus {
    border-color: #F2A623;
    box-shadow: 0 0 6px rgba(242, 166, 35, 0.25);
  }
  .seed-btn {
    background: linear-gradient(180deg, #2A1810 0%, #1a0d06 100%);
    border: 1px solid #6B4225;
    color: #F2A623;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 2px;
    text-shadow: 0 0 4px rgba(242, 166, 35, 0.4);
    transition: all 0.15s ease;
  }
  .seed-btn:hover {
    border-color: #F2A623;
    color: #FFD580;
  }
  .seed-btn:active {
    transform: translateY(1px);
  }

  .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #8B7355;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .readout {
    font-family: 'Courier New', 'Consolas', monospace;
    font-weight: 700;
    color: #F2A623;
    text-shadow:
      0 0 4px rgba(242, 166, 35, 0.5),
      0 0 12px rgba(242, 166, 35, 0.2);
    letter-spacing: 1px;
  }
  .readout.big   { font-size: 28px; line-height: 1; }
  .readout.med   { font-size: 16px; line-height: 1.2; }
  .readout.small { font-size: 12px; line-height: 1.2; }

  .readout.unit {
    color: #8B7355;
    font-size: 11px;
    margin-left: 4px;
    text-shadow: none;
  }

  .progress {
    margin-top: 8px;
    height: 8px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid #3D2615;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #A33B1D 0%, #F2A623 100%);
    box-shadow:
      inset 0 1px 0 rgba(255, 200, 100, 0.4),
      0 0 6px rgba(242, 166, 35, 0.4);
    transition: width 0.1s linear;
    width: 0%;
  }
  .progress-ticks {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent 0,
      transparent calc(10% - 1px),
      rgba(0,0,0,0.5) calc(10% - 1px),
      rgba(0,0,0,0.5) 10%
    );
    pointer-events: none;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    gap: 8px;
  }

  .status-pill {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 2px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid;
  }
  .status-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    box-shadow: 0 0 4px currentColor;
  }
  .status-pill.ok      { color: #6FBF45; border-color: #3a6624; background: rgba(60, 102, 36, 0.15); }
  .status-pill.ok    .dot { background: #6FBF45; animation: pulse-dot 2s ease-in-out infinite; }
  .status-pill.warn    { color: #F2A623; border-color: #6B4225; background: rgba(107, 66, 37, 0.2); }
  .status-pill.warn  .dot { background: #F2A623; animation: pulse-dot 1.2s ease-in-out infinite; }
  .status-pill.danger  { color: #A33B1D; border-color: #5a1f0d; background: rgba(90, 31, 13, 0.2); }
  .status-pill.danger.dot { background: #A33B1D; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .driver-icon {
    width: 22px; height: 22px;
    flex-shrink: 0;
  }

  /* ============================================================
     MENU OVERLAY (start screen)
     ============================================================ */
  .overlay {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(
      ellipse at center,
      rgba(10, 6, 3, 0.55) 0%,
      rgba(5, 3, 1, 0.92) 100%
    );
    transition: opacity 0.6s ease;
    pointer-events: auto;
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Grain texture overlay */
  .overlay::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 2px,
        rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 3px
      );
    pointer-events: none;
  }

  .title-block {
    text-align: center;
    transform: rotate(-2deg);
    margin-bottom: 50px;
    position: relative;
  }

  .title {
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 120px;
    font-weight: 900;
    letter-spacing: 12px;
    color: #C4661F;
    text-shadow:
      3px 3px 0 #2A1810,
      6px 6px 0 #1a0d06,
      6px 6px 30px rgba(163, 59, 29, 0.6),
      0 0 60px rgba(242, 166, 35, 0.15);
    line-height: 1;
    position: relative;
    background: linear-gradient(180deg, #E89540 0%, #A33B1D 50%, #6B2A14 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(4px 4px 0 #2A1810) drop-shadow(0 0 30px rgba(242, 166, 35, 0.25));
  }

  /* Distressed scratches across title */
  .title-block::after {
    content: "";
    position: absolute;
    inset: -10px;
    background-image:
      linear-gradient(105deg, transparent 48%, rgba(0,0,0,0.4) 49%, transparent 50%),
      linear-gradient(85deg, transparent 38%, rgba(0,0,0,0.25) 39%, transparent 40%),
      linear-gradient(95deg, transparent 70%, rgba(0,0,0,0.3) 71%, transparent 72%);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  .subtitle {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #8B7355;
    margin-top: 16px;
    text-shadow: 1px 1px 0 #1a0d06;
  }

  .subtitle .accent {
    color: #F2A623;
  }

  .start-btn {
    pointer-events: auto;
    background: linear-gradient(180deg, #2A1810 0%, #1a0d06 100%);
    border: 2px solid #6B4225;
    color: #F2A623;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 6px;
    padding: 18px 56px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s ease;
    position: relative;
    box-shadow:
      inset 0 1px 0 rgba(139, 90, 43, 0.5),
      inset 0 -2px 0 rgba(0, 0, 0, 0.6),
      0 4px 16px rgba(0, 0, 0, 0.6),
      0 0 30px rgba(242, 166, 35, 0.1);
    text-shadow: 0 0 6px rgba(242, 166, 35, 0.5);
    animation: btn-pulse 2.4s ease-in-out infinite;
  }

  .start-btn::before, .start-btn::after {
    content: "";
    position: absolute;
    width: 6px; height: 6px;
    background: radial-gradient(circle at 30% 30%, #8B5A2B, #1a0d06);
    border-radius: 50%;
    box-shadow: 0 0 2px rgba(0,0,0,0.8);
  }
  .start-btn::before { top: 6px; left: 6px; }
  .start-btn::after  { top: 6px; right: 6px; }

  .start-btn:hover {
    border-color: #F2A623;
    color: #FFD580;
    box-shadow:
      inset 0 1px 0 rgba(139, 90, 43, 0.5),
      inset 0 -2px 0 rgba(0, 0, 0, 0.6),
      0 4px 16px rgba(0, 0, 0, 0.6),
      0 0 40px rgba(242, 166, 35, 0.4);
    transform: translateY(-1px);
  }

  .start-btn:active {
    transform: translateY(1px);
    box-shadow:
      inset 0 2px 4px rgba(0, 0, 0, 0.6),
      0 0 30px rgba(242, 166, 35, 0.3);
  }

  @keyframes btn-pulse {
    0%, 100% { box-shadow:
      inset 0 1px 0 rgba(139, 90, 43, 0.5),
      inset 0 -2px 0 rgba(0, 0, 0, 0.6),
      0 4px 16px rgba(0, 0, 0, 0.6),
      0 0 30px rgba(242, 166, 35, 0.1); }
    50% { box-shadow:
      inset 0 1px 0 rgba(139, 90, 43, 0.5),
      inset 0 -2px 0 rgba(0, 0, 0, 0.6),
      0 4px 16px rgba(0, 0, 0, 0.6),
      0 0 50px rgba(242, 166, 35, 0.35); }
  }

  .hint {
    margin-top: 32px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #5C3A1F;
    text-transform: uppercase;
  }

  /* ============================================================
     END SCREEN
     ============================================================ */
  .end-screen-content {
    text-align: center;
    transform: rotate(-1deg);
  }

  .end-title {
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(180deg, #E89540 0%, #A33B1D 50%, #6B2A14 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(3px 3px 0 #2A1810);
    line-height: 1;
  }

  .end-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 24px 0;
  }
  .end-divider .bar {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, #6B4225, transparent);
  }
  .end-divider .dot {
    width: 6px; height: 6px;
    background: #F2A623;
    box-shadow: 0 0 8px rgba(242, 166, 35, 0.6);
    transform: rotate(45deg);
  }

  .stat-row {
    font-family: 'Courier New', monospace;
    font-size: 18px;
    color: #E8D8B0;
    letter-spacing: 3px;
    margin-bottom: 28px;
    line-height: 1.8;
  }
  .stat-row .stat-label {
    color: #8B7355;
    font-size: 12px;
    letter-spacing: 4px;
  }
  .stat-row .stat-value {
    color: #F2A623;
    text-shadow: 0 0 8px rgba(242, 166, 35, 0.4);
    font-weight: 700;
  }
  .stat-row .stat-sep {
    color: #5C3A1F;
    margin: 0 16px;
  }

  /* Initial state for end screen — start hidden */
  #endScreen { display: none; }
  #endScreen.active { display: flex; }
</style>
</head>
<body>

<div id="stage">
  <div id="frame">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hud">
      <div class="panel hud-tl">
        <div class="label">Distance Remaining</div>
        <div>
          <span id="distanceValue" class="readout big">5,000</span>
          <span class="readout unit">M</span>
        </div>
        <div class="progress">
          <div id="progressFill" class="progress-fill"></div>
          <div class="progress-ticks"></div>
        </div>
      </div>

      <div class="panel hud-tr">
        <div class="label">Velocity</div>
        <div style="display:flex; align-items:baseline; gap:10px;">
          <div>
            <span id="speedMps" class="readout med">0.0</span>
            <span class="readout unit">M/S</span>
          </div>
          <div>
            <span id="speedKph" class="readout small">0</span>
            <span class="readout unit">KM/H</span>
          </div>
        </div>
        <div class="status-row">
          <div id="truckStatus" class="status-pill warn">
            <span class="dot"></span><span>STOPPED</span>
          </div>
          <div id="driverStatus" class="status-pill ok" style="gap:8px;">
            <svg class="driver-icon" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="7" r="3" fill="currentColor" opacity="0.9"/>
              <path d="M5 21 C5 15 9 13 12 13 C15 13 19 15 19 21 Z" fill="currentColor" opacity="0.9"/>
            </svg>
            <span id="driverStatusLabel">DRIVER OK</span>
          </div>
        </div>
      </div>
      <!-- Test: Stop/Resume button (Phase 1 debug only) -->
      <button id="stopBtn" class="hud-btn hud-bc">STOP</button>

      <!-- Test: Seed debug panel (Phase 1 only — remove in Phase 2 when seed UI is on setup screen) -->
      <div class="panel hud-bl">
        <div class="label">Seed</div>
        <div class="seed-row">
          <input id="seedInput" class="seed-input" type="text" value="C0FFEE" maxlength="10" spellcheck="false" autocomplete="off">
          <button id="seedApplyBtn" class="seed-btn">APPLY</button>
          <button id="seedRandomBtn" class="seed-btn" title="New random seed">⟳</button>
        </div>
      </div>
    </div>
    <div id="startScreen" class="overlay">
      <div class="title-block">
        <div class="title">CONVOY</div>
        <div class="subtitle">DEFEND <span class="accent">·</span> THE <span class="accent">·</span> CARGO</div>
      </div>
      <button id="startBtn" class="start-btn">START CONVOY</button>
      <div class="hint">5,000 METERS · HOSTILE TERRITORY</div>
    </div>

    <!-- End screen -->
    <div id="endScreen" class="overlay">
      <div class="end-screen-content">
        <div class="end-title">DESTINATION REACHED</div>
        <div class="end-divider">
          <div class="bar"></div>
          <div class="dot"></div>
          <div class="bar"></div>
        </div>
        <div class="stat-row">
          <div>
            <span class="stat-label">TIME</span>
            <span class="stat-sep">·</span>
            <span id="finalTime" class="stat-value">0.0s</span>
          </div>
          <div>
            <span class="stat-label">AVG SPEED</span>
            <span class="stat-sep">·</span>
            <span id="finalSpeed" class="stat-value">0.0 km/h</span>
          </div>
          <div>
            <span class="stat-label">DISTANCE</span>
            <span class="stat-sep">·</span>
            <span id="finalDistance" class="stat-value">5,000 m</span>
          </div>
        </div>
        <button id="runAgainBtn" class="start-btn">RUN AGAIN</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ============================================================
// CONFIG — game constants (tunable)
// ============================================================
const CONFIG = Object.freeze({
  // World
  DISTANCE_TOTAL_M:       5000,
  SPEED_CRUISING_MPS:     16.67,  // ≈60 km/h (5000m / 300s)
  SPEED_ACCEL_DURATION_S: 1.0,
  SPEED_DECEL_DURATION_S: 1.5,

  // Canvas (logical)
  CANVAS_W: 1280,
  CANVAS_H: 720,

  // Truck
  TRUCK_DECK_COUNT:   4,
  TRUCK_X:            120,      // left edge of body
  TRUCK_W:            1040,     // body width (so 120..1160)
  TRUCK_TOP:          120,      // top of upper deck
  TRUCK_BOTTOM:       560,      // bottom of lower deck (ground line for body)
  TRUCK_FRONT_NOSE_W: 150,      // front slope/cockpit area width
  TRUCK_BACK_W:       140,      // rear hatch area width
  TRUCK_WHEEL_RADIUS: 42,
  TRUCK_WHEEL_Y:      610,
  TRUCK_DECK_PADDING: 6,        // floor/ceiling divider thickness

  // Parallax tuning
  PIXELS_PER_METER:   6,        // how many px the world scrolls per meter

  // Layer scroll factors
  LAYER_FACTORS: {
    SKY:        0.00,
    SUN:        0.01,
    MOUNTAINS:  0.05,
    HILLS:      0.18,
    DUNES:      0.35,
    NEAR:       0.70,
    FOREGROUND: 1.00,
  },

  // Effects
  WHEEL_ROTATION_FACTOR: 0.18,   // radians per (m/s * s)
  EXHAUST_RATE_HZ:       28,
  DUST_RATE_HZ:          22,

  // Seed
  DEFAULT_SEED: 0xC0FFEE,
});

// Derived: deck geometry. Read from TRUCK_DECK_COUNT so layout adapts.
const DECK_HEIGHT = (CONFIG.TRUCK_BOTTOM - CONFIG.TRUCK_TOP) / CONFIG.TRUCK_DECK_COUNT;

// Phase enum
const PHASE = Object.freeze({
  MENU:        'menu',
  DRIVING:     'driving',
  ARRIVING:    'arriving',  // sub-state of driving for end-deceleration
  WON:         'won',
  LOST:        'lost',      // not used in Phase 1, reserved
});

const TRUCK_STATE = Object.freeze({
  STOPPED:      'stopped',
  ACCELERATING: 'accelerating',
  CRUISING:     'cruising',
  DECELERATING: 'decelerating',
});

// ============================================================
// UTILITIES
// ============================================================

// Seeded PRNG (Mulberry32). Same seed -> same stream.
function makeRng(seed) {
  let s = seed >>> 0;
  return function rng() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp  = (a, b, t) => a + (b - a) * t;
// Smoothstep-style easing (in/out)
const easeInOut = t => t * t * (3 - 2 * t);
const easeOut   = t => 1 - (1 - t) * (1 - t);
const easeIn    = t => t * t;

// Get deck Y bounds (top, bottom) for deck index (0 = top deck, 3 = bottom)
function getDeckBounds(i) {
  const top = CONFIG.TRUCK_TOP + i * DECK_HEIGHT;
  return { top, bottom: top + DECK_HEIGHT };
}

// Generate a tile of polygon points for a parallax silhouette layer.
// Returns an array of { x, y } points and a tileWidth.
function generateSilhouetteTile(rng, opts) {
  const { tileWidth, baseY, amplitude, segments, jitter, peakStyle } = opts;
  const points = [];
  const step = tileWidth / segments;

  for (let i = 0; i <= segments; i++) {
    const x = i * step;
    let y;
    if (peakStyle === 'sharp') {
      // jagged mountain peaks
      const r1 = rng();
      const r2 = rng();
      const peak = Math.pow(r1, 1.5); // bias toward lower values, occasional spike
      y = baseY - peak * amplitude - r2 * jitter;
    } else if (peakStyle === 'rolling') {
      // smooth dunes via sin combination
      const r = rng();
      const w1 = Math.sin(i / segments * Math.PI * 2.7 + r * 4);
      const w2 = Math.sin(i / segments * Math.PI * 1.3 + r * 2);
      y = baseY - (0.5 + 0.25 * w1 + 0.25 * w2) * amplitude - rng() * jitter;
    } else {
      // 'debris' — noisy low strip with occasional bumps
      const spike = rng() > 0.93 ? rng() * amplitude : 0;
      y = baseY - rng() * jitter - spike;
    }
    points.push({ x, y });
  }
  return { points, tileWidth };
}

// Generate decorative props (dead trees, wrecks, rocks) for near-ground layer
function generateNearProps(rng, tileWidth) {
  const props = [];
  let x = 30;
  while (x < tileWidth) {
    const r = rng();
    let kind;
    if (r < 0.35) kind = 'rock';
    else if (r < 0.6) kind = 'scrub';
    else if (r < 0.85) kind = 'deadTree';
    else kind = 'wreck';

    props.push({
      x,
      kind,
      size: 0.6 + rng() * 0.8,
      flip: rng() > 0.5,
    });
    x += 70 + rng() * 160;
  }
  return props;
}

// Generate birds scattered in the sky (a tile that loops)
function generateBirds(rng, tileWidth) {
  const birds = [];
  for (let i = 0; i < 7; i++) {
    birds.push({
      x: rng() * tileWidth,
      y: 30 + rng() * 100,
      size: 4 + rng() * 4,
      drift: -2 - rng() * 4,  // slow leftward drift in addition to parallax
    });
  }
  return birds;
}

const canvas = document.getElementById('game');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = CONFIG.CANVAS_W * dpr;
  canvas.height = CONFIG.CANVAS_H * dpr;

// ---- Background (sky + sun) -------------------------------
function renderSky() {
  // Vertical gradient: deep amber -> burnt orange -> dusty tan at horizon
  const g = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_H);
  g.addColorStop(0.00, '#3D1810');
  g.addColorStop(0.35, '#A85428');
  g.addColorStop(0.65, '#C68B3C');
  g.addColorStop(0.90, '#E8B774');
  g.addColorStop(1.00, '#D8A560');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, CONFIG.CANVAS_W, CONFIG.CANVAS_H);

  // Sun — fixed position, doesn't move (or extremely slowly)
  const sunX = 970, sunY = 230;
  const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 180);
  sunGrad.addColorStop(0.00, 'rgba(255, 220, 140, 0.95)');
  sunGrad.addColorStop(0.18, 'rgba(255, 180, 90, 0.55)');
  sunGrad.addColorStop(0.45, 'rgba(220, 120, 60, 0.15)');
  sunGrad.addColorStop(1.00, 'rgba(220, 120, 60, 0)');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(sunX - 200, sunY - 200, 400, 400);

  // Sun core
  ctx.beginPath();
  ctx.arc(sunX, sunY, 36, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 240, 180, 0.85)';
  ctx.fill();

  // Horizontal heat-haze band over horizon
  const haze = ctx.createLinearGradient(0, 440, 0, 540);
  haze.addColorStop(0, 'rgba(232, 183, 116, 0)');
  haze.addColorStop(0.5, 'rgba(232, 183, 116, 0.18)');
  haze.addColorStop(1, 'rgba(232, 183, 116, 0)');
  ctx.fillStyle = haze;
  ctx.fillRect(0, 440, CONFIG.CANVAS_W, 100);
}

// Render a single repeating silhouette layer
function renderSilhouetteLayer(layer) {
  const { tile, tileWidth, offset, colorStops, opacity, baseY } = layer;

  ctx.save();
  ctx.globalAlpha = opacity;

  const grad = ctx.createLinearGradient(0, baseY - 250, 0, CONFIG.CANVAS_H);
  for (const cs of colorStops) grad.addColorStop(cs.stop, cs.color);
  ctx.fillStyle = grad;

  // Draw two adjacent tiles to seamlessly cover the screen.
  // offset is the world scroll; we draw at -offset and -offset + tileWidth, etc.
  const startX = -((offset % tileWidth + tileWidth) % tileWidth);

  for (let tx = startX; tx < CONFIG.CANVAS_W; tx += tileWidth) {
    ctx.beginPath();
    ctx.moveTo(tx + tile.points[0].x, CONFIG.CANVAS_H);
    for (const p of tile.points) {
      ctx.lineTo(tx + p.x, p.y);
    }
    ctx.lineTo(tx + tileWidth, CONFIG.CANVAS_H);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

// Render decorative near-ground props (rocks, wrecks, dead trees)
function renderNearProps(layer) {
  const { props, tileWidth, offset, baseY } = layer;
  if (!props) return;

  const startTile = -((offset % tileWidth + tileWidth) % tileWidth);

  ctx.save();
  for (let tx = startTile; tx < CONFIG.CANVAS_W; tx += tileWidth) {
    for (const p of props) {
      const x = tx + p.x;
      if (x < -100 || x > CONFIG.CANVAS_W + 100) continue;
      drawProp(x, baseY, p);
    }
  }
  ctx.restore();
}

function drawProp(x, baseY, p) {
  const s = p.size;
  ctx.save();
  ctx.translate(x, baseY);
  if (p.flip) ctx.scale(-1, 1);

  if (p.kind === 'rock') {
    ctx.fillStyle = '#3a2515';
    ctx.beginPath();
    ctx.moveTo(-14 * s, 0);
    ctx.lineTo(-9 * s, -14 * s);
    ctx.lineTo(2 * s, -18 * s);
    ctx.lineTo(12 * s, -10 * s);
    ctx.lineTo(15 * s, 0);
    ctx.closePath();
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(168, 114, 60, 0.25)';
    ctx.beginPath();
    ctx.moveTo(-6 * s, -12 * s);
    ctx.lineTo(2 * s, -16 * s);
    ctx.lineTo(6 * s, -10 * s);
    ctx.closePath();
    ctx.fill();
  } else if (p.kind === 'scrub') {
    ctx.fillStyle = '#2a1c0e';
    for (let i = -3; i <= 3; i++) {
      ctx.fillRect(i * 3 * s, -10 * s, 1.5 * s, 10 * s);
    }
    // Round base
    ctx.beginPath();
    ctx.ellipse(0, 0, 12 * s, 3 * s, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.kind === 'deadTree') {
    ctx.strokeStyle = '#1f1208';
    ctx.lineCap = 'round';
    ctx.lineWidth = 3 * s;
    // Trunk
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(2 * s, -36 * s);
    ctx.stroke();
    // Branches
    ctx.lineWidth = 1.8 * s;
    ctx.beginPath();
    ctx.moveTo(2 * s, -22 * s); ctx.lineTo(-10 * s, -32 * s);
    ctx.moveTo(2 * s, -28 * s); ctx.lineTo(14 * s, -34 * s);
    ctx.moveTo(2 * s, -34 * s); ctx.lineTo(-6 * s, -42 * s);
    ctx.moveTo(2 * s, -34 * s); ctx.lineTo(8 * s, -44 * s);
    ctx.stroke();
  } else if (p.kind === 'wreck') {
    // Rusted vehicle silhouette
    ctx.fillStyle = '#2a1408';
    // Body
    ctx.fillRect(-22 * s, -18 * s, 44 * s, 14 * s);
    // Cabin
    ctx.beginPath();
    ctx.moveTo(-22 * s, -18 * s);
    ctx.lineTo(-14 * s, -28 * s);
    ctx.lineTo(8 * s, -28 * s);
    ctx.lineTo(14 * s, -18 * s);
    ctx.closePath();
    ctx.fill();
    // Hint of tipped angle
    ctx.fillStyle = '#1a0d04';
    ctx.fillRect(-22 * s, -4 * s, 44 * s, 4 * s);
    // Wheel stubs
    ctx.beginPath();
    ctx.arc(-14 * s, -4 * s, 4 * s, 0, Math.PI * 2);
    ctx.arc(14 * s, -4 * s, 4 * s, 0, Math.PI * 2);
    ctx.fill();
    // Rust hint
    ctx.fillStyle = 'rgba(163, 59, 29, 0.3)';
    ctx.fillRect(-18 * s, -14 * s, 8 * s, 2 * s);
  }
  ctx.restore();
}

// Render the birds layer
function renderBirds(layer) {
  const { birds, tileWidth, offset } = layer;
  if (!birds) return;

  const startTile = -((offset % tileWidth + tileWidth) % tileWidth);

  ctx.save();
  ctx.strokeStyle = 'rgba(40, 20, 10, 0.55)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';

  for (let tx = startTile; tx < CONFIG.CANVAS_W; tx += tileWidth) {
    for (const b of birds) {
      const x = tx + b.x;
      if (x < -20 || x > CONFIG.CANVAS_W + 20) continue;
      const wing = b.size;
      ctx.beginPath();
      ctx.moveTo(x - wing, b.y);
      ctx.quadraticCurveTo(x - wing * 0.4, b.y - wing * 0.5, x, b.y);
      ctx.quadraticCurveTo(x + wing * 0.4, b.y - wing * 0.5, x + wing, b.y);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// Foreground: a thin strip of close-up dust/dirt at the very bottom
function renderForeground(layer) {
  const { offset, tileWidth } = layer;
  // Dark dirt strip
  ctx.fillStyle = '#1a0d06';
  ctx.fillRect(0, 685, CONFIG.CANVAS_W, 35);

  // Dust speckles
  const startTile = -((offset % tileWidth + tileWidth) % tileWidth);
  ctx.fillStyle = 'rgba(232, 183, 116, 0.15)';
  for (let tx = startTile; tx < CONFIG.CANVAS_W; tx += tileWidth) {
    for (let i = 0; i < 40; i++) {
      // Deterministic speckle positions per tile
      const fx = ((i * 37) % tileWidth);
      const fy = 690 + (i * 13 % 25);
      ctx.fillRect(tx + fx, fy, 2, 1);
    }
  }
}

// ---- Truck ------------------------------------------------

// Helper: draw a row of rivets along a line
function drawRivets(x1, y1, x2, y2, count, color = '#1a0d06') {
  ctx.fillStyle = color;
  for (let i = 0; i < count; i++) {
    const t = (i + 0.5) / count;
    const x = x1 + (x2 - x1) * t;
    const y = y1 + (y2 - y1) * t;
    ctx.beginPath();
    ctx.arc(x, y, 1.8, 0, Math.PI * 2);
    ctx.fill();
  }
}

function renderTruck() {
  const t = gameState.truck;
  const bodyLeft  = CONFIG.TRUCK_X + CONFIG.TRUCK_FRONT_NOSE_W;
  const bodyRight = CONFIG.TRUCK_X + CONFIG.TRUCK_W - CONFIG.TRUCK_BACK_W;
  const bodyTop    = CONFIG.TRUCK_TOP;
  const bodyBottom = CONFIG.TRUCK_BOTTOM;

  // Underbody shadow (cast onto ground)
  const shadowGrad = ctx.createRadialGradient(
    (CONFIG.TRUCK_X + CONFIG.TRUCK_W / 2), CONFIG.TRUCK_WHEEL_Y + 30, 20,
    (CONFIG.TRUCK_X + CONFIG.TRUCK_W / 2), CONFIG.TRUCK_WHEEL_Y + 30, 600
  );
  shadowGrad.addColorStop(0, 'rgba(0, 0, 0, 0.55)');
  shadowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = shadowGrad;
  ctx.fillRect(CONFIG.TRUCK_X - 100, CONFIG.TRUCK_WHEEL_Y + 25, CONFIG.TRUCK_W + 200, 60);

  // ---- FRONT NOSE / RAM ---------------------------------
  renderFrontNose(bodyLeft, bodyTop, bodyBottom);

  // ---- MAIN BODY ARMOR (outer rectangle for body silhouette) -----
  // We draw deck-by-deck so the renderer reads from the truck.decks array.

  // Outer armor highlights (top edge of body)
  ctx.fillStyle = '#8B5A2B';
  ctx.fillRect(bodyLeft, bodyTop - 8, bodyRight - bodyLeft, 8);
  // Roof shadow
  ctx.fillStyle = '#3D2615';
  ctx.fillRect(bodyLeft, bodyTop - 2, bodyRight - bodyLeft, 2);

  // Decks (rendered in a loop based on truck.decks.length)
  for (let i = 0; i < t.decks.length; i++) {
    renderDeck(t.decks[i], bodyLeft, bodyRight);
  }

  // Major vertical structural seams (full-height ribs every quarter)
  ctx.fillStyle = '#1a0d06';
  const seamPositions = [0.25, 0.5, 0.75];
  for (const sp of seamPositions) {
    const x = bodyLeft + (bodyRight - bodyLeft) * sp;
    ctx.fillRect(x - 1.5, bodyTop, 3, bodyBottom - bodyTop);
    // Highlight to one side for 3D effect
    ctx.fillStyle = 'rgba(139, 90, 43, 0.4)';
    ctx.fillRect(x - 2, bodyTop, 1, bodyBottom - bodyTop);
    ctx.fillStyle = '#1a0d06';
  }

  // ---- BACK / REAR HATCH --------------------------------
  renderBackHatch(bodyRight, bodyTop, bodyBottom);

  // ---- ROOF: top hatch + antennas + lookout perch -------
  renderRoofDetails(bodyLeft, bodyRight, bodyTop);

  // ---- EXHAUST SMOKE STACKS -----------------------------
  renderExhaustStacks(bodyLeft, bodyRight, bodyTop);

  // ---- WHEELS -------------------------------------------
  renderWheels(t.wheelAngle);

  // ---- COCKPIT INTERIOR (driver silhouette) -------------
  renderCockpitInterior(bodyLeft);

  // ---- ENGINE ROOM (bottom-left, just inside body) ------
  renderEngineRoom(bodyLeft);
}

function renderFrontNose(bodyLeft, bodyTop, bodyBottom) {
  // Front slopes from cockpit windshield down to bumper
  const noseLeft = CONFIG.TRUCK_X;
  const cockpitDeckBottom = CONFIG.TRUCK_TOP + DECK_HEIGHT;

  // Windshield area (upper portion of nose)
  ctx.fillStyle = '#3D2615';
  ctx.beginPath();
  ctx.moveTo(noseLeft + 30, bodyTop);          // top-left of nose roof
  ctx.lineTo(bodyLeft, bodyTop);                // join to deck 1 ceiling
  ctx.lineTo(bodyLeft, cockpitDeckBottom);      // deck 1 bottom
  ctx.lineTo(noseLeft + 20, cockpitDeckBottom); // diagonal forward
  ctx.lineTo(noseLeft + 10, bodyTop + 18);      // slant up
  ctx.closePath();
  ctx.fill();

  // Windshield (angled glass)
  const windGrad = ctx.createLinearGradient(noseLeft + 20, bodyTop + 10, bodyLeft - 10, cockpitDeckBottom - 20);
  windGrad.addColorStop(0, '#0d1a22');
  windGrad.addColorStop(0.5, '#1a2a36');
  windGrad.addColorStop(1, '#2a3a4a');
  ctx.fillStyle = windGrad;
  ctx.beginPath();
  ctx.moveTo(noseLeft + 30, bodyTop + 8);
  ctx.lineTo(bodyLeft - 4, bodyTop + 8);
  ctx.lineTo(bodyLeft - 4, cockpitDeckBottom - 16);
  ctx.lineTo(noseLeft + 22, cockpitDeckBottom - 16);
  ctx.closePath();
  ctx.fill();

  // Windshield highlight (a streak of light)
  ctx.fillStyle = 'rgba(232, 183, 116, 0.18)';
  ctx.beginPath();
  ctx.moveTo(noseLeft + 30, bodyTop + 10);
  ctx.lineTo(bodyLeft - 6, bodyTop + 10);
  ctx.lineTo(bodyLeft - 6, bodyTop + 18);
  ctx.lineTo(noseLeft + 30, bodyTop + 22);
  ctx.closePath();
  ctx.fill();

  // Windshield frame
  ctx.strokeStyle = '#1a0d06';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(noseLeft + 30, bodyTop + 8);
  ctx.lineTo(bodyLeft - 4, bodyTop + 8);
  ctx.lineTo(bodyLeft - 4, cockpitDeckBottom - 16);
  ctx.lineTo(noseLeft + 22, cockpitDeckBottom - 16);
  ctx.closePath();
  ctx.stroke();

  // Lower nose / hood (decks 2-4 worth of slope)
  ctx.fillStyle = '#5a3520';
  ctx.beginPath();
  ctx.moveTo(noseLeft + 20, cockpitDeckBottom);     // upper-left of hood
  ctx.lineTo(bodyLeft, cockpitDeckBottom);           // joins body
  ctx.lineTo(bodyLeft, bodyBottom);                  // down body left edge
  ctx.lineTo(noseLeft + 10, bodyBottom);             // ram bottom-left
  ctx.lineTo(noseLeft, bodyBottom - 30);             // ram lower-front
  ctx.lineTo(noseLeft + 5, cockpitDeckBottom + 20);  // ram top-front
  ctx.closePath();
  ctx.fill();

  // Hood highlight
  ctx.fillStyle = '#6B4225';
  ctx.fillRect(noseLeft + 25, cockpitDeckBottom + 4, bodyLeft - noseLeft - 30, 4);

  // ---- FRONT RAM / BUMPER with vertical spikes ----
  // The ram extends slightly past the nose
  const ramX  = noseLeft - 8;
  const ramY1 = bodyBottom - 80;
  const ramY2 = bodyBottom + 10;

  // Spike bar (vertical bars)
  ctx.fillStyle = '#2A1810';
  for (let i = 0; i < 5; i++) {
    const sx = ramX + 4 + i * 6;
    // Triangular spike
    ctx.beginPath();
    ctx.moveTo(sx, ramY1 + 10);
    ctx.lineTo(sx + 3, ramY1 - 4);
    ctx.lineTo(sx + 6, ramY1 + 10);
    ctx.closePath();
    ctx.fill();
  }

  // Bumper plate
  ctx.fillStyle = '#3D2615';
  ctx.fillRect(ramX, ramY1 + 10, 32, ramY2 - ramY1 - 10);
  ctx.fillStyle = '#1a0d06';
  ctx.fillRect(ramX, ramY1 + 10, 32, 3);
  ctx.fillRect(ramX, ramY2 - 8, 32, 2);
  // Rivets on bumper
  drawRivets(ramX + 4, ramY1 + 18, ramX + 28, ramY1 + 18, 4);
  drawRivets(ramX + 4, ramY2 - 12, ramX + 28, ramY2 - 12, 4);

  // Hazard stripe on bumper edge
  ctx.fillStyle = '#F2A623';
  ctx.fillRect(ramX, ramY2 - 5, 32, 2);
  ctx.fillStyle = '#1a0d06';
  for (let i = 0; i < 6; i++) {
    ctx.fillRect(ramX + i * 6, ramY2 - 5, 3, 2);
  }
}

function renderDeck(deck, bodyLeft, bodyRight) {
  const { top, bottom, index } = deck;
  const deckW = bodyRight - bodyLeft;

  // Deck interior fill — slight vertical gradient for depth (lighter at top, darker at bottom)
  const deckGrad = ctx.createLinearGradient(0, top, 0, bottom);
  deckGrad.addColorStop(0, '#52392A');
  deckGrad.addColorStop(0.5, '#4A3526');
  deckGrad.addColorStop(1, '#3A2A1F');
  ctx.fillStyle = deckGrad;
  ctx.fillRect(bodyLeft, top, deckW, bottom - top);

  // Armor plate panels: subtle alternating tone bands across the deck width
  // Each panel is ~120px wide. This sells "riveted plates welded together".
  const panelW = 130;
  const panelTones = ['rgba(0,0,0,0)', 'rgba(0,0,0,0.06)', 'rgba(255,200,150,0.02)'];
  for (let x = bodyLeft, i = 0; x < bodyRight; x += panelW, i++) {
    ctx.fillStyle = panelTones[i % panelTones.length];
    ctx.fillRect(x, top + 4, Math.min(panelW, bodyRight - x), bottom - top - 8);
  }

  // Plate seams (vertical hairlines every panelW)
  ctx.fillStyle = 'rgba(20, 12, 8, 0.55)';
  for (let x = bodyLeft + panelW; x < bodyRight; x += panelW) {
    ctx.fillRect(x, top + 4, 1, bottom - top - 8);
  }
  // Rivets along plate seams
  ctx.fillStyle = '#1a0d06';
  for (let x = bodyLeft + panelW; x < bodyRight; x += panelW) {
    for (let yi = 0; yi < 5; yi++) {
      const ry = top + 14 + yi * ((bottom - top - 28) / 4);
      ctx.beginPath();
      ctx.arc(x, ry, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Rust streaks running down the plates (a few per deck, deterministic by deck index)
  // Phase 1 visual atmosphere only — keep deterministic so it doesn't shimmer
  const streakRng = makeRng(0xA17 + index * 73);
  const streakCount = 5 + Math.floor(streakRng() * 3);
  ctx.save();
  for (let s = 0; s < streakCount; s++) {
    const sx = bodyLeft + 20 + streakRng() * (deckW - 40);
    const sy = top + 2 + streakRng() * 8;
    const sh = 16 + streakRng() * (bottom - top - 30);
    const sw = 1 + streakRng() * 2;
    const opacity = 0.06 + streakRng() * 0.10;

    const streakGrad = ctx.createLinearGradient(0, sy, 0, sy + sh);
    streakGrad.addColorStop(0, `rgba(163, 59, 29, ${opacity * 1.4})`);
    streakGrad.addColorStop(0.6, `rgba(120, 50, 20, ${opacity})`);
    streakGrad.addColorStop(1, `rgba(60, 30, 15, 0)`);
    ctx.fillStyle = streakGrad;
    ctx.fillRect(sx, sy, sw, sh);
  }
  ctx.restore();

  // Floor texture: slats
  ctx.fillStyle = 'rgba(26, 13, 6, 0.30)';
  for (let x = bodyLeft + 12; x < bodyRight; x += 24) {
    ctx.fillRect(x, top + 4, 1, bottom - top - 8);
  }

  // Ceiling shadow gradient (subtle)
  const ceilGrad = ctx.createLinearGradient(0, top, 0, top + 28);
  ceilGrad.addColorStop(0, 'rgba(0, 0, 0, 0.55)');
  ceilGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = ceilGrad;
  ctx.fillRect(bodyLeft, top, deckW, 28);

  // Floor shadow gradient (subtle)
  const floorGrad = ctx.createLinearGradient(0, bottom - 24, 0, bottom);
  floorGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
  floorGrad.addColorStop(1, 'rgba(0, 0, 0, 0.6)');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(bodyLeft, bottom - 24, deckW, 24);

  // Deck divider (between this deck and one below)
  if (index < CONFIG.TRUCK_DECK_COUNT - 1) {
    ctx.fillStyle = '#2A1810';
    ctx.fillRect(bodyLeft, bottom - CONFIG.TRUCK_DECK_PADDING / 2, deckW, CONFIG.TRUCK_DECK_PADDING);
    // Highlight on divider
    ctx.fillStyle = '#6B4225';
    ctx.fillRect(bodyLeft, bottom - CONFIG.TRUCK_DECK_PADDING / 2 - 1, deckW, 1);
    // Rivets along divider
    drawRivets(bodyLeft + 30, bottom - 2, bodyRight - 30, bottom - 2, 18);
  }

  // PHASE 2: ladders will be placed here (read from deck.ladders)
  // PHASE 2: cargo crates will be placed here (read from deck.crates)
  // Phase 1 visual flavor: place a single hint ladder + a couple of crates
  renderDeckFlavor(deck, bodyLeft, bodyRight);
}

// Phase 1 visual flavor — Phase 2 will replace with procedural ladder/crate placement
function renderDeckFlavor(deck, bodyLeft, bodyRight) {
  const { top, bottom, index } = deck;
  const deckCenterY = (top + bottom) / 2;

  // One ladder hint per transition zone (between decks)
  // Place a ladder going down from the floor of this deck (visual only).
  // Choose deterministic-but-different positions per deck.
  if (index < CONFIG.TRUCK_DECK_COUNT - 1) {
    // Per-deck ladder x offset (visual flavor only — Phase 2 generates these properly)
    const flavorLadderX = [0.32, 0.65, 0.45][index] ?? 0.5;
    const lx = bodyLeft + (bodyRight - bodyLeft) * flavorLadderX;

    ctx.save();
    ctx.strokeStyle = '#2A1810';
    ctx.lineWidth = 2.5;
    // Side rails
    ctx.beginPath();
    ctx.moveTo(lx - 8, bottom - 26);
    ctx.lineTo(lx - 8, bottom + 4);
    ctx.moveTo(lx + 8, bottom - 26);
    ctx.lineTo(lx + 8, bottom + 4);
    ctx.stroke();
    // Rungs
    ctx.lineWidth = 1.8;
    for (let ry = bottom - 22; ry <= bottom + 2; ry += 6) {
      ctx.beginPath();
      ctx.moveTo(lx - 8, ry);
      ctx.lineTo(lx + 8, ry);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Cargo crates: a few decorative ones on decks 2 and 3
  // Phase 2 will replace this with procedural crates from deck.crates
  if (index === 1) {
    drawCrate(bodyLeft + 380, bottom - 30, 36, 30);
    drawCrate(bodyLeft + 420, bottom - 30, 36, 30);
    drawCrate(bodyLeft + 400, bottom - 60, 36, 30);
  } else if (index === 2) {
    drawCrate(bodyLeft + 620, bottom - 32, 40, 32);
    drawCrate(bodyLeft + 280, bottom - 28, 32, 28);
  }

  // Hanging chain on deck 1 for atmosphere
  if (index === 0) {
    const cx = bodyLeft + 520;
    ctx.strokeStyle = '#1a0d06';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let cy = top + 4; cy < top + 28; cy += 4) {
      ctx.moveTo(cx - 1, cy); ctx.lineTo(cx + 1, cy + 2);
    }
    ctx.stroke();
  }
}

function drawCrate(x, y, w, h) {
  ctx.fillStyle = '#5a3a1f';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#3D2615';
  ctx.fillRect(x, y, w, 3);
  ctx.fillRect(x, y + h - 3, w, 3);
  // Cross-bracing
  ctx.strokeStyle = '#2A1810';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + 2, y + 3); ctx.lineTo(x + w - 2, y + h - 4);
  ctx.moveTo(x + w - 2, y + 3); ctx.lineTo(x + 2, y + h - 4);
  ctx.stroke();
  // Rust hint
  ctx.fillStyle = 'rgba(163, 59, 29, 0.2)';
  ctx.fillRect(x + 4, y + 8, 5, 2);
}

function renderWheels(angle) {

  const positions = [
    truckLeft + 70,

function drawWheel(cx, cy, r, angle) {
  // Tire outer
  ctx.fillStyle = '#0d0703';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // Tire tread marks (dashes around the perimeter, rotated with angle)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.strokeStyle = '#2A1810';
  ctx.lineWidth = 2;
  const treadCount = 18;
  for (let i = 0; i < treadCount; i++) {
    const a = (i / treadCount) * Math.PI * 2;
    const x1 = Math.cos(a) * (r - 2);
    const y1 = Math.sin(a) * (r - 2);
    const x2 = Math.cos(a) * (r - 7);
    const y2 = Math.sin(a) * (r - 7);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  ctx.restore();

  // Hub
  ctx.fillStyle = '#3D2615';
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
  ctx.fill();

  // Spokes (rotate with wheel)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.strokeStyle = '#1a0d06';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  const spokeCount = 5;
  for (let i = 0; i < spokeCount; i++) {
    const a = (i / spokeCount) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * (r * 0.5), Math.sin(a) * (r * 0.5));
    ctx.stroke();
  }
  // Center cap
  ctx.fillStyle = '#8B5A2B';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Wheel highlight (top, gives it dimension; does NOT rotate)
  ctx.fillStyle = 'rgba(139, 90, 43, 0.25)';
  ctx.beginPath();
  ctx.arc(cx, cy - r * 0.35, r * 0.6, Math.PI, Math.PI * 2);
  ctx.fill();
}

function renderEngineRoom(bodyLeft) {

  const deck4 = gameState.truck.decks[CONFIG.TRUCK_DECK_COUNT - 1];

  ctx.moveTo(doorX + 1.5, doorY + doorH / 2); ctx.lineTo(doorX + 8.5, doorY + doorH / 2);

// ---- Particles --------------------------------------------
function renderParticles() {
  for (const p of gameState.particles) {
    if (p.kind === 'exhaust') {
      ctx.fillStyle = `rgba(60, 50, 45, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.kind === 'dust') {
      ctx.fillStyle = `rgba(168, 114, 60, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ---- Master render ----------------------------------------
function render() {
  // Background
  renderSky();

  // Parallax layers from far to near
  // Order: mountains -> hills -> dunes -> birds -> near props -> near silhouette -> truck -> foreground
  // (birds are drawn behind near props for depth)
  const byId = {};
  for (const L of gameState.parallaxLayers) byId[L.id] = L;

  if (byId.mountains) renderSilhouetteLayer(byId.mountains);
  if (byId.hills)     renderSilhouetteLayer(byId.hills);
  if (byId.birds)     renderBirds(byId.birds);
  if (byId.dunes)     renderSilhouetteLayer(byId.dunes);
  if (byId.near)      renderSilhouetteLayer(byId.near);
  if (byId.near)      renderNearProps(byId.near);

  // Exhaust smoke renders behind the truck (so it trails out)
  // but in front of background. Draw exhaust particles before truck:
  ctx.save();
  for (const p of gameState.particles) {
    if (p.kind === 'exhaust') {
      ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();

  // Truck
  renderTruck();

  // PHASE 3+: render soldiers, enemies, projectiles here
  // for (const s of gameState.soldiers) renderSoldier(s);
  // for (const e of gameState.enemies)  renderEnemy(e);

  // Dust particles render in front of truck (kicked up around wheels)
  ctx.save();
  for (const p of gameState.particles) {
    if (p.kind === 'dust') {
      ctx.fillStyle = `rgba(168, 114, 60, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();

  // Foreground (very close ground strip)
  if (byId.foreground) renderForeground(byId.foreground);
}

// ============================================================
// UPDATE — per-frame logic
// ============================================================

// Compute effective speed. Phase 5+ will use the multipliers.
function getEffectiveSpeed(baseSpeed) {
  return baseSpeed * (1 - gameState.truck.sabotageDebuff) * (1 + gameState.truck.nitroBonus);
}

function updateTruckSpeed(dt) {
  const t = gameState.truck;
  const cruise = CONFIG.SPEED_CRUISING_MPS;

  if (t.state === TRUCK_STATE.STOPPED) {
    t.speed = 0;
    return;
  }

  if (t.state === TRUCK_STATE.ACCELERATING) {
    t.accelTimer += dt;
    const u = clamp(t.accelTimer / CONFIG.SPEED_ACCEL_DURATION_S, 0, 1);
    const base = lerp(0, cruise, easeInOut(u));
    t.speed = getEffectiveSpeed(base);
    if (u >= 1) {
      t.state = TRUCK_STATE.CRUISING;
      t.speed = getEffectiveSpeed(cruise);
    }
  } else if (t.state === TRUCK_STATE.CRUISING) {
    t.speed = getEffectiveSpeed(cruise);
  } else if (t.state === TRUCK_STATE.DECELERATING) {
    t.decelTimer += dt;
    const u = clamp(t.decelTimer / CONFIG.SPEED_DECEL_DURATION_S, 0, 1);
    t.speed = lerp(t.speedAtDecel, 0, easeOut(u));
    if (u >= 1) {
      t.speed = 0;
      t.state = TRUCK_STATE.STOPPED;
      if (gameState.phase === PHASE.ARRIVING) {
        gameState.phase = PHASE.WON;
        showEndScreen();
      }
    }
  }
}

function updateDistance(dt) {
  if (gameState.phase !== PHASE.DRIVING && gameState.phase !== PHASE.ARRIVING) return;

  const distThisFrame = gameState.truck.speed * dt;
  gameState.distanceRemaining = Math.max(0, gameState.distanceRemaining - distThisFrame);
  gameState.totalDistanceDrivenM += distThisFrame;
  gameState.elapsedDrivingS += dt;

  // Trigger deceleration when destination is close
  if (gameState.phase === PHASE.DRIVING &&
      gameState.distanceRemaining <= 0 &&
      gameState.truck.state !== TRUCK_STATE.DECELERATING) {
    gameState.phase = PHASE.ARRIVING;
    gameState.truck.state = TRUCK_STATE.DECELERATING;
    gameState.truck.speedAtDecel = gameState.truck.speed;
    gameState.truck.decelTimer = 0;
  }
}

function updateWheelRotation(dt) {
  // Spin rate proportional to current speed. Truck drives LEFT, so wheels
  // rotate counter-clockwise (negative in canvas coords, where Y points down).
  // dθ = -speed * dt * factor
  gameState.truck.wheelAngle -= gameState.truck.speed * dt * CONFIG.WHEEL_ROTATION_FACTOR;
  // Wrap to keep numbers small
  gameState.truck.wheelAngle %= Math.PI * 2;
}

function updateParallax(dt) {
  // Every layer scrolls by truck speed * factor * dt * PIXELS_PER_METER
  // Truck faces and drives LEFT (driver on the left side of cockpit, looking left),
  // so the world scrolls to the RIGHT relative to the camera.
  const baseDeltaPx = gameState.truck.speed * dt * CONFIG.PIXELS_PER_METER;
  for (const layer of gameState.parallaxLayers) {
    layer.offset -= baseDeltaPx * layer.factor;
    // Keep offset bounded for numerical stability
    if (layer.tileWidth > 0) {
      layer.offset %= layer.tileWidth;
    }
  }
}

// Particle systems
let _exhaustAccumulator = 0;
let _dustAccumulator    = 0;

function updateParticles(dt) {
  const t = gameState.truck;
  const bodyLeft = CONFIG.TRUCK_X + CONFIG.TRUCK_FRONT_NOSE_W;
  const bodyTop  = CONFIG.TRUCK_TOP;

  // Spawn exhaust if moving (or even when idle a wisp)
  _exhaustAccumulator += dt;
  const exhaustInterval = t.speed > 0.5
    ? 1 / CONFIG.EXHAUST_RATE_HZ
    : 1 / (CONFIG.EXHAUST_RATE_HZ * 0.3);
  while (_exhaustAccumulator >= exhaustInterval) {
    _exhaustAccumulator -= exhaustInterval;
    spawnExhaust(bodyLeft + 380, bodyTop - 56);
    if (gameState.rng() < 0.6) spawnExhaust(bodyLeft + 420, bodyTop - 48);
  }

  // Spawn dust under wheels (only when moving)
  if (t.speed > 0.5) {
    _dustAccumulator += dt;
    const dustInterval = 1 / (CONFIG.DUST_RATE_HZ * clamp(t.speed / CONFIG.SPEED_CRUISING_MPS, 0.2, 1.5));
    while (_dustAccumulator >= dustInterval) {
      _dustAccumulator -= dustInterval;
      spawnDust();
    }
  }

  // Tick particles
  for (let i = gameState.particles.length - 1; i >= 0; i--) {
    const p = gameState.particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      gameState.particles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.size += p.grow * dt;
    p.alpha = (p.life / p.maxLife) * p.alphaMax;
  }
}

function spawnExhaust(x, y) {
  // Speed-based wind drag: faster truck = stronger backward drift on smoke.
  // Truck drives LEFT, so smoke trails to the RIGHT (positive vx).
  // When stopped, no wind drift — smoke rises vertically.
  const speedFactor = clamp(gameState.truck.speed / CONFIG.SPEED_CRUISING_MPS, 0, 1);
  const driftBack = speedFactor * 100;
  gameState.particles.push({
    kind:   'exhaust',
    x: x + (gameState.rng() - 0.5) * 4,
    y: y + (gameState.rng() - 0.5) * 2,
    vx:     driftBack + (gameState.rng() - 0.5) * 10,
    vy:     -22 - gameState.rng() * 12,
    gravity: 4,
    size:    4 + gameState.rng() * 3,
    grow:    14,
    life:    2.4 + gameState.rng() * 0.6,
    maxLife: 2.4,
    alpha:   0.4,
    alphaMax: 0.4,
    r: 50 + Math.floor(gameState.rng() * 30),
    g: 42 + Math.floor(gameState.rng() * 22),
    b: 38 + Math.floor(gameState.rng() * 18),
  });
}

function spawnDust() {
  // Pick a random wheel x-pos
  const truckLeft  = CONFIG.TRUCK_X;
  const truckRight = CONFIG.TRUCK_X + CONFIG.TRUCK_W;
  const wheelXs = [
    truckLeft + 70, truckLeft + 150, truckLeft + 230,
    truckRight - 240, truckRight - 160, truckRight - 80,
  ];
  const wx = wheelXs[Math.floor(gameState.rng() * wheelXs.length)];
  const wy = CONFIG.TRUCK_WHEEL_Y + CONFIG.TRUCK_WHEEL_RADIUS - 4;

  // Dust drifts backward (RIGHT) since truck moves LEFT relative to ground
  const speedFactor = clamp(gameState.truck.speed / CONFIG.SPEED_CRUISING_MPS, 0, 1);
  gameState.particles.push({
    kind: 'dust',
    x: wx + (gameState.rng() - 0.5) * 14,
    y: wy + (gameState.rng() - 0.5) * 4,
    vx: 40 + speedFactor * 80 + (gameState.rng() - 0.5) * 20,
    vy: -10 - gameState.rng() * 20,
    gravity: 60,
    size: 1.5 + gameState.rng() * 2,
    grow: 6,
    life: 0.8 + gameState.rng() * 0.4,
    maxLife: 0.8,
    alpha: 0.5,
    alphaMax: 0.5,
  });
}

// ---- HUD update ------------------------------------------
const hudEls = {
  root:            document.getElementById('hud'),
  distanceValue:   document.getElementById('distanceValue'),
  progressFill:    document.getElementById('progressFill'),
  speedMps:        document.getElementById('speedMps'),
  speedKph:        document.getElementById('speedKph'),
  truckStatus:     document.getElementById('truckStatus'),
  driverStatus:    document.getElementById('driverStatus'),
  driverStatusLbl: document.getElementById('driverStatusLabel'),
};

function formatMeters(m) {
  // 4,237 style
  const v = Math.round(m);
  return v.toLocaleString('en-US');
}

function updateHUD() {
  // Distance
  hudEls.distanceValue.textContent = formatMeters(gameState.distanceRemaining);
  const pct = (1 - gameState.distanceRemaining / CONFIG.DISTANCE_TOTAL_M) * 100;
  hudEls.progressFill.style.width = pct.toFixed(2) + '%';

  // Speed
  const mps = gameState.truck.speed;
  hudEls.speedMps.textContent = mps.toFixed(1);
  hudEls.speedKph.textContent = Math.round(mps * 3.6).toString();

  // Truck status pill
  const ts = hudEls.truckStatus;
  ts.classList.remove('ok', 'warn', 'danger');
  const stateLabel = ts.querySelector('span:last-child');
  switch (gameState.truck.state) {
    case TRUCK_STATE.STOPPED:
      ts.classList.add('warn');
      stateLabel.textContent = 'STOPPED';
      break;
    case TRUCK_STATE.ACCELERATING:
      ts.classList.add('warn');
      stateLabel.textContent = 'ACCEL';
      break;
    case TRUCK_STATE.CRUISING:
      ts.classList.add('ok');
      stateLabel.textContent = 'ROLLING';
      break;
    case TRUCK_STATE.DECELERATING:
      ts.classList.add('warn');
      stateLabel.textContent = 'BRAKING';
      break;
  }

  // Driver status — reads from gameState.truck.cockpit.driverStatus
  const ds = hudEls.driverStatus;
  ds.classList.remove('ok', 'warn', 'danger');
  switch (gameState.truck.cockpit.driverStatus) {
    case 'OK':
      ds.classList.add('ok');
      hudEls.driverStatusLbl.textContent = 'DRIVER OK';
      break;
    case 'DOWN':
      ds.classList.add('danger');
      hudEls.driverStatusLbl.textContent = 'DRIVER DOWN';
      break;
    case 'NONE':
      ds.classList.add('danger');
      hudEls.driverStatusLbl.textContent = 'NO DRIVER';
      break;
  }
}

// ---- Master update ----------------------------------------
function update(dt) {
  updateTruckSpeed(dt);
  updateDistance(dt);
  updateWheelRotation(dt);
  updateParallax(dt);
  updateParticles(dt);

  // PHASE 3+: update soldiers, enemies, projectiles
  // PHASE 5+: wave spawn check

  updateHUD();
}

// ============================================================
// INPUT — event handlers
// ============================================================
const startBtn    = document.getElementById('startBtn');
const startScreen = document.getElementById('startScreen');
const endScreen   = document.getElementById('endScreen');
const runAgainBtn = document.getElementById('runAgainBtn');
const stopBtn     = document.getElementById('stopBtn');

startBtn.addEventListener('click', () => {
  startMission();
});

runAgainBtn.addEventListener('click', () => {
  resetAndRestart();
});

// Phase 1 debug: toggle truck stop/resume. Tests that wheels, exhaust
// drift, dust spawn, and parallax all respond to speed correctly.
stopBtn.addEventListener('click', () => {
  // Don't interfere with the end-of-mission deceleration
  if (gameState.phase !== PHASE.DRIVING) return;

  const t = gameState.truck;
  if (t.state === TRUCK_STATE.STOPPED) {
    // Resume — re-accelerate from zero
    t.state = TRUCK_STATE.ACCELERATING;
    t.accelTimer = 0;
    stopBtn.textContent = 'STOP';
    stopBtn.classList.remove('is-stopped');
  } else {
    // Hard stop — instant zero. No deceleration easing; we want to
    // verify that wheels, smoke, dust and parallax all freeze cleanly.
    t.state = TRUCK_STATE.STOPPED;
    t.speed = 0;
    t.accelTimer = 0;
    t.decelTimer = 0;
    stopBtn.textContent = 'RESUME';
    stopBtn.classList.add('is-stopped');
  }
});

// Phase 1 debug: seed input. Tests that the same seed reproduces an
// identical world, and that a different seed produces a different one.
// PHASE 2 will move this to the proper setup screen.
const seedInput     = document.getElementById('seedInput');
const seedApplyBtn  = document.getElementById('seedApplyBtn');
const seedRandomBtn = document.getElementById('seedRandomBtn');

// Initialize input to reflect the current seed
seedInput.value = gameState.seed.toString(16).toUpperCase();

function parseSeedString(s) {
  // Accept hex (with or without 0x) or decimal. Returns 32-bit unsigned int.
  s = (s || '').trim().replace(/^0x/i, '');
  if (!s) return null;
  // Try hex first (default — matches what we display)
  let n = parseInt(s, 16);
  if (Number.isFinite(n) && n >= 0) return n >>> 0;
  return null;
}

function applySeed(rawSeed) {
  const n = parseSeedString(rawSeed);
  if (n === null) {
    seedInput.style.borderColor = '#A33B1D';
    setTimeout(() => { seedInput.style.borderColor = ''; }, 600);
    return false;
  }
  gameState.seed = n;
  gameState.rng = makeRng(n);
  initParallax(n);
  // PHASE 2: initDecks() will also regenerate ladders/crates from this seed
  // Display canonical hex form so user sees what was actually parsed
  seedInput.value = n.toString(16).toUpperCase();
  return true;
}

seedApplyBtn.addEventListener('click', () => applySeed(seedInput.value));
seedInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') applySeed(seedInput.value);
});
seedRandomBtn.addEventListener('click', () => {
  const r = (Math.random() * 0xFFFFFFFF) >>> 0;
  seedInput.value = r.toString(16).toUpperCase();
  applySeed(seedInput.value);
});

// Mouse position tracking (Phase 2+ will use this for soldier commands)
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CONFIG.CANVAS_W / rect.width;
  const scaleY = CONFIG.CANVAS_H / rect.height;
  gameState.inputState.mousePos.x = (e.clientX - rect.left) * scaleX;
  gameState.inputState.mousePos.y = (e.clientY - rect.top)  * scaleY;
});

// PHASE 2+: canvas.addEventListener('click', handleCanvasClick);

// ============================================================
// LIFECYCLE — init, start, end, loop
// ============================================================

function init() {
  // Build truck data structure
  initDecks();
  // Build parallax world
  initParallax(gameState.seed);
}

function startMission() {
  // Smoothly fade out start screen
  startScreen.classList.add('hidden');

  // Show HUD
  hudEls.root.classList.add('visible');

  // Begin acceleration
  gameState.phase = PHASE.DRIVING;
  gameState.truck.state = TRUCK_STATE.ACCELERATING;
  gameState.truck.accelTimer = 0;
  gameState.stats.timeStartedAt = performance.now();
  gameState.elapsedDrivingS = 0;
  gameState.totalDistanceDrivenM = 0;
}

function showEndScreen() {
  // Populate stats
  const t = gameState.elapsedDrivingS;
  const avgMps = gameState.totalDistanceDrivenM / Math.max(0.01, t);
  document.getElementById('finalTime').textContent = t.toFixed(1) + 's';
  document.getElementById('finalSpeed').textContent = (avgMps * 3.6).toFixed(1) + ' km/h';
  document.getElementById('finalDistance').textContent = formatMeters(CONFIG.DISTANCE_TOTAL_M) + ' m';

  endScreen.classList.add('active');
  // Force layout then fade in (overlay default is opacity 1 unless hidden class)
  endScreen.classList.remove('hidden');
  // Hide HUD during end screen
  hudEls.root.classList.remove('visible');
}

function resetAndRestart() {
  // Reset state
  gameState.phase = PHASE.MENU;
  gameState.distanceRemaining = CONFIG.DISTANCE_TOTAL_M;
  gameState.elapsedDrivingS = 0;
  gameState.totalDistanceDrivenM = 0;
  gameState.truck.state = TRUCK_STATE.STOPPED;
  gameState.truck.speed = 0;
  gameState.truck.targetSpeed = 0;
  gameState.truck.accelTimer = 0;
  gameState.truck.decelTimer = 0;
  gameState.truck.speedAtDecel = 0;
  gameState.truck.wheelAngle = 0;
  gameState.truck.sabotageDebuff = 0;
  gameState.truck.nitroBonus = 0;
  gameState.truck.cockpit.driverStatus = 'OK';
  gameState.particles.length = 0;
  // Re-init parallax with same seed so it visually resets to start
  initParallax(gameState.seed);

  // Reset stop button to its default state
  stopBtn.textContent = 'STOP';
  stopBtn.classList.remove('is-stopped');

  // Hide end screen, immediately start mission again
  endScreen.classList.remove('active');
  // Trigger mission start (will re-show HUD)
  startMission();
}

// Delta-time game loop
let lastFrameTime = null;
let _frameAccum = 0;

function gameLoop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  // Clamp to avoid spiral-of-death on tab unfocus
  if (dt > 0.1) dt = 0.1;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// Boot
init();
// Render one frame for the start screen background
render();
updateHUD();
requestAnimationFrame(gameLoop);
</script>
